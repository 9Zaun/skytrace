<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — SkyTrace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #111111;
      --gold:  #f1c27d;
      --text:  rgba(255,255,255,0.42);
      --label: rgba(241,194,125,0.55);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ── Overlay & page entry ── */
    .st-overlay {
      position: fixed; inset: 0;
      background: #111111;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 450ms ease;
    }
    .st-page-entry {
      opacity: 0;
      transform: translateY(56px);
      animation: contactSlideIn 620ms cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      animation-delay: 60ms;
      min-height: 100vh;
    }
    @keyframes contactSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Grid lines ── */
    .st-grid {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      display: flex;
    }
    .st-grid-v {
      flex: 1;
      border-right: 1px solid rgba(241,194,125,0.09);
    }
    .st-grid-v:first-child { border-left: 1px solid rgba(241,194,125,0.09); }
    .st-grid-h {
      position: fixed; left: 0; right: 0; height: 1px;
      background: rgba(241,194,125,0.09);
    }
    .st-grid-h.mid { top: 50%; }

    /* ── Close button ── */
    .st-close {
      position: fixed;
      top: 20px; right: 40px;
      z-index: 100;
      background: none;
      border: none;
      color: rgba(255,255,255,0.28);
      font-size: 0.78rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1.5px;
      cursor: pointer;
      padding: 6px 10px;
      transition: color 0.2s ease;
    }
    .st-close:hover { color: var(--gold); }

    /* ── Layout ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      padding: 56px 40px 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-label {
      font-size: 0.56rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--label);
      font-family: 'JetBrains Mono', monospace;
    }

    .page-title {
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: clamp(4px, 1.2vw, 14px);
      text-transform: uppercase;
      color: #fff;
      line-height: 0.92;
      margin-top: 16px;
    }

    .page-sub {
      font-size: 0.68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-top: 16px;
    }

    .page-divider {
      width: 100%;
      height: 1px;
      background: rgba(241,194,125,0.12);
      margin: 48px 0;
    }

    /* ── Form ── */
    .st-contact-form {
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .st-cfield { display: flex; flex-direction: column; gap: 8px; }
    .st-clabel {
      font-size: 0.56rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      font-family: 'JetBrains Mono', monospace;
    }
    .st-cinput, .st-ctextarea {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0;
      color: #fff;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.88rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s ease;
      width: 100%;
      -webkit-appearance: none;
    }
    .st-cinput:focus, .st-ctextarea:focus {
      border-color: rgba(241,194,125,0.32);
    }
    .st-ctextarea { resize: vertical; min-height: 108px; font-family: inherit; }
    .st-cerror {
      display: none;
      font-size: 0.56rem;
      letter-spacing: 1.5px;
      color: rgba(255,80,80,0.6);
      font-family: 'JetBrains Mono', monospace;
    }
    .st-cerror.show { display: block; }
    .st-csubmit {
      align-self: flex-start;
      padding: 12px 28px;
      background: none;
      border: 1px solid rgba(241,194,125,0.32);
      color: rgba(241,194,125,0.65);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .st-csubmit:hover { border-color: var(--gold); color: var(--gold); }

    .st-csuccess {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .st-csuccess-tag {
      font-size: 0.56rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--label);
      font-family: 'JetBrains Mono', monospace;
    }
    .st-csuccess-msg {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.8;
    }

    @media (max-width: 768px) {
      .page-wrap { padding: 48px 20px 60px; }
      .st-close  { right: 20px; top: 16px; }
    }
  </style>
</head>
<body>

  <div class="st-overlay" id="stOverlay"></div>

  <div class="st-grid">
    <div class="st-grid-v"></div>
    <div class="st-grid-v"></div>
    <div class="st-grid-v"></div>
    <div class="st-grid-h mid"></div>
  </div>

  <button class="st-close" onclick="navigateBack(event)" aria-label="Return to index">&#x2715;&nbsp;INDEX</button>

  <div class="st-page-entry" id="pageContent">
    <div class="page-wrap">

      <span class="page-label">SEC.00 // CONTACT</span>
      <h1 class="page-title">CONTACT</h1>
      <p class="page-sub">Want to reach us? Drop a message.</p>

      <div class="page-divider"></div>

      <form class="st-contact-form" id="contactForm" onsubmit="submitContact(event)" novalidate>
        <div class="st-cfield">
          <label class="st-clabel" for="cName">Full Name</label>
          <input type="text" id="cName" class="st-cinput" placeholder="Your name" autocomplete="name"/>
          <span class="st-cerror" id="errName">Name is required.</span>
        </div>
        <div class="st-cfield">
          <label class="st-clabel" for="cEmail">Email Address</label>
          <input type="email" id="cEmail" class="st-cinput" placeholder="you@example.com" autocomplete="email"/>
          <span class="st-cerror" id="errEmail">A valid email address is required.</span>
        </div>
        <div class="st-cfield">
          <label class="st-clabel" for="cMsg">Message</label>
          <textarea id="cMsg" class="st-ctextarea" placeholder="Your message"></textarea>
          <span class="st-cerror" id="errMsg">Message is required.</span>
        </div>
        <button type="submit" class="st-csubmit">SEND MESSAGE</button>
      </form>

      <div class="st-csuccess" id="contactSuccess">
        <span class="st-csuccess-tag">MESSAGE SENT</span>
        <p class="st-csuccess-msg">Thank you for reaching out. We&rsquo;ll be in touch shortly.</p>
      </div>

    </div>
  </div>

  <script>
    /* ── Page entry transition ── */
    (function() {
      var overlay = document.getElementById('stOverlay');
      if (sessionStorage.getItem('st_transition') === '1') {
        sessionStorage.removeItem('st_transition');
        overlay.style.transition    = 'none';
        overlay.style.opacity       = '1';
        overlay.style.pointerEvents = 'none';
        setTimeout(function() {
          overlay.style.transition = 'opacity 500ms ease';
          overlay.style.opacity    = '0';
          setTimeout(function() {
            overlay.style.transition    = '';
            overlay.style.opacity       = '';
            overlay.style.pointerEvents = '';
          }, 520);
        }, 20);
      }
    })();

    /* ── Navigate back to index with reverse (slide down) transition ── */
    function navigateBack(e) {
      if (e) e.preventDefault();
      var overlay = document.getElementById('stOverlay');
      var content = document.getElementById('pageContent');

      /* Slide content back downward */
      content.style.transition = 'transform 480ms cubic-bezier(0.65,0,0.35,1), opacity 380ms ease';
      content.style.transform  = 'translateY(56px)';
      content.style.opacity    = '0';

      overlay.style.transition    = 'opacity 420ms ease';
      overlay.style.pointerEvents = 'all';
      overlay.style.opacity       = '1';

      setTimeout(function() {
        sessionStorage.setItem('st_transition', '1');
        window.location.href = 'index.html';
      }, 440);
    }

    /* ── Contact form validation ── */
    function submitContact(ev) {
      ev.preventDefault();
      var name    = document.getElementById('cName').value.trim();
      var email   = document.getElementById('cEmail').value.trim();
      var msg     = document.getElementById('cMsg').value.trim();
      var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      document.getElementById('errName').classList.toggle('show', !name);
      document.getElementById('errEmail').classList.toggle('show', !(email && emailOk));
      document.getElementById('errMsg').classList.toggle('show', !msg);

      if (name && emailOk && msg) {
        document.getElementById('contactForm').style.display   = 'none';
        document.getElementById('contactSuccess').style.display = 'flex';
      }
    }
  </script>

</body>
</html>
