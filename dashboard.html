<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyTrace — My Flight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Dashboard-specific ── */
    * { font-family: 'JetBrains Mono', 'Courier New', monospace; }

  body {
  background:
    linear-gradient(
      180deg,
      #1a1a1a 0%,
      #141414 35%,
      #101010 70%,
      #0c0c0c 100%
    );

  min-height: 100vh;

  overflow-x: hidden;

  position: relative;
}
    .dash-wrap {
       min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8) var(--sp-6);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-6);
      text-align: center;
    }

    .empty-label {
      font-size: 0.68rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .empty-title {
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      max-width: 36ch;
      line-height: 1.8;
    }

    /* ── SETUP FORM ── */
    .setup-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      width: 100%;
      max-width: 440px;
      margin-top: var(--sp-2);
    }

    .setup-form select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
      border-radius: 2px;
      outline: none;
      transition: border-color var(--transition-fast);
      cursor: pointer;
    }

    .setup-form select:focus { border-color: var(--gold); }

    /* ── DASHBOARD BOARD ── */
  .board {
  width: 100%;
  max-width: 720px;

  position: relative;

  border-radius: 30px;

  overflow: hidden;

  background:
    linear-gradient(
      180deg,
      #0f0f0f 0%,
      #050505 45%,
      #000000 100%
    );

  border:
    1px solid rgba(255, 255, 255, 0);

  box-shadow:
    0 50px 100px rgba(0,0,0,0.65),
    0 25px 40px rgba(0,0,0,0.55),
    inset 0 2px 1px rgba(255, 255, 255, 0),
    inset 0 -2px 1px rgba(255,255,255,0.03);

  isolation: isolate;

  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.board::before {
  content: "";

  position: absolute;

  inset: 0;

  border-radius: inherit;

  background:
    linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.062) 0%,
      rgba(255,255,255,0.08) 10%,
      transparent 28%,
      transparent 58%,
      rgba(255,255,255,0.04) 100%
    );

  pointer-events: none;

  mix-blend-mode: screen;
}
.board::after {
  content: "";

  position: absolute;

  inset: 2px;

  border-radius: 28px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.08) 0%,
      transparent 18%,
      transparent 82%,
      rgba(255,255,255,0.025) 100%
    );

  pointer-events: none;
}
.board .st{
  padding:8px 12px;

  border-radius:6px;

  font-size:0.72rem;
  font-weight:700;

  letter-spacing:1.5px;
}

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--border);
    }
    .dot.red    { background: #c0392b; }
    .dot.yellow { background: #c39d63; }
    .dot.green  { background: #27ae60; }

    .board-title{
  font-size:0.72rem;
  font-weight:700;

  letter-spacing:3px;
  text-transform:uppercase;

  

  margin-left:var(--sp-2);
  opacity:.9;
}

    .board-clock {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 2px;
    }
    .board-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 18px 24px;

  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0),
      rgba(255,255,255,0.02)
    );

  border-bottom:
    1px solid rgba(255,255,255,0.06);

  backdrop-filter: blur(18px);
}

    /* Board body */
    .board-body { padding: 20px 18px; display: flex; flex-direction: column; gap: 0; }

    /* Section divider */
    .b-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-block: 14px;
    }

    /* Flight ID row */
    .b-flight-id {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .b-id {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
    }

    .b-airline{
  font-size:0.82rem;
  font-weight:600;

  letter-spacing:2.2px;
  text-transform:uppercase;

  color:rgba(255,255,255,0.72);
}

    /* Route row */
    .b-route {
  display: flex;
  align-items: center;

  gap: 18px;

  font-size: 2.4rem;

  font-weight: 700;

  letter-spacing: 6px;

  color: white;

  margin-bottom: 10px;

  text-shadow:
    0 0 10px rgba(255,255,255,0.08);
}
    .b-route-arrow {
      color: var(--text-faint);
      font-size: 1rem;
    }

    /* Data rows grid */
    .b-grid {
  display: grid;

  grid-template-columns: 1fr 1fr;

  gap: 16px;

  margin-top: 8px;
}

    .b-cell {
  position: relative;

  display: flex;
  flex-direction: column;

  gap: 6px;

  padding: 18px;

  border-radius: 18px;

  background:
    linear-gradient(
      180deg,
      rgba(20,20,20,0.98),
      rgba(0,0,0,1)
    );

  border:
    1px solid rgba(255,255,255,0.05);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(255,255,255,0.02);

  transition:
    transform 0.25s ease,
    border-color 0.25s ease,
    background 0.25s ease;
}
.b-cell::before {
  content: "";

  position: absolute;

  inset: 0;

  border-radius: inherit;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.08),
      transparent 35%
    );

  pointer-events: none;
}
.b-cell:hover {
  transform: translateY(-3px);

  border-color: rgba(195,157,99,0.22);

  background: rgba(255,255,255,0.05);
}

    .b-cell:nth-last-child(-n+2) { border-bottom: none; }

    .b-cell-label{
  font-size:0.64rem;
  font-weight:700;

  letter-spacing:2.4px;
  text-transform:uppercase;

  color:rgba(255,255,255,0.42);
}

    .b-cell-value{
  font-size:1.02rem;
  font-weight:700;

  letter-spacing:1.5px;

  color:rgba(255,255,255,0.92);
}
.b-alert {
  display: none;

  align-items: center;

  gap: 12px;

  margin-top: 18px;

  padding: 16px 18px;

  border-radius: 18px;

  background:
    linear-gradient(
      180deg,
      rgba(35,20,0,0.92),
      rgba(10,10,10,0.96)
    );

  border:
    1px solid rgba(195,157,99,0.35);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 0 20px rgba(195,157,99,0.08);

  color: #f1c27d;

  backdrop-filter: blur(18px);
}


    .b-cell-value.gold { color: var(--gold); }

    /* Flash animation — triggers when a value changes */
    @keyframes flash {
      0%   { background: rgba(195,157,99,0.25); color: var(--gold); }
      100% { background: transparent; color: var(--text); }
    }

    .b-cell.flashing {
      animation: flash 1.4s ease forwards;
      border-radius: 2px;
      padding-inline: 6px;
    }

    /* Status cell — full width */
    .b-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .b-status-label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* Gate changed alert */
    .b-alert {
  display: none;
  align-items: center;
  gap: var(--sp-3);

  padding: 14px 18px;

  border-radius: 16px;

  border: 1px solid rgba(195,157,99,0.18);

  background: rgba(195,157,99,0.08);

  backdrop-filter: blur(18px);

  font-size: 0.75rem;

  letter-spacing: 1px;

  color: var(--gold);

  box-shadow:
    0 0 20px rgba(195,157,99,0.08);

  animation: flash 1.4s ease infinite alternate;
}

    .b-alert.visible { display: flex; }

    .b-alert-icon { font-size: 0.9rem; }

    /* Weather row */
    .b-weather {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .b-weather-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .b-weather-airport{
  font-size:0.64rem;
  font-weight:700;

  letter-spacing:2.4px;
  text-transform:uppercase;

  color:rgba(255,255,255,0.5);
}

    .b-weather-val{
  font-size:0.9rem;
  font-weight:600;

  letter-spacing:0.6px;

  color:rgba(255,255,255,0.82);

  margin-top:2px;
}
.b-weather-cell{
  display:flex;
  flex-direction:column;
  gap:6px;
}
    /* Messages / notices */
    .b-messages { display: flex; flex-direction: column; gap: 6px; }

    .b-msg {
      font-size: 0.72rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 8px 0;
      border-bottom: 1px solid var(--surface);
      line-height: 1.6;
    }

    .b-msg:last-child { border-bottom: none; }

    .b-msg-tag {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 8px;
    }

    .b-msg-tag.info    { color: var(--gold-dim); }
    .b-msg-tag.warn    { color: var(--status-delayed); }
    .b-msg-tag.alert   { color: var(--status-cancelled); }

    /* Clear button */
    .b-clear {
      margin-top: var(--sp-4);
      text-align: center;
    }

    .b-clear button {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-faint);
      background: none;
      border: none;
      cursor: pointer;
      transition: color var(--transition-fast);
    }

    .b-clear button:hover { color: var(--status-cancelled); }
    .board {
  animation: floatBoard 7s ease-in-out infinite;
}

@keyframes floatBoard {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

    @media (max-width: 480px) {
      .b-route { font-size: 1.2rem; }
      .b-id    { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- ── MAIN ── -->
  <main class="dash-wrap" id="dashWrap">
    <!-- Filled by JS: either empty state or live board -->
  </main>

  <script>
    /* ── FLIGHT DATA ── */
    const FLIGHTS = [
      { id:"QR 001", airline:"Qatar Airways",  from:"DOH", to:"LHR", fromCity:"Doha",      toCity:"London",    dep:"08:00", arr:"13:45", gate:"A1",    status:"ON-TIME"       },
      { id:"QR 701", airline:"Qatar Airways",  from:"DOH", to:"JFK", fromCity:"Doha",      toCity:"New York",  dep:"09:30", arr:"16:00", gate:"B3",    status:"CANCELLED"     },
      { id:"AI 101", airline:"Air India",      from:"DEL", to:"BOM", fromCity:"Delhi",     toCity:"Mumbai",    dep:"01:15", arr:"03:20", gate:"T3-12", status:"ON-TIME"       },
      { id:"AI 102", airline:"Air India",      from:"DEL", to:"DOH", fromCity:"Delhi",     toCity:"Doha",      dep:"16:45", arr:"19:30", gate:"T1-08", status:"BOARDING"      },
      { id:"6E 502", airline:"IndiGo",         from:"DEL", to:"DXB", fromCity:"Delhi",     toCity:"Dubai",     dep:"02:30", arr:"05:00", gate:"T1-04", status:"CANCELLED"     },
      { id:"EK 201", airline:"Emirates",       from:"DXB", to:"JFK", fromCity:"Dubai",     toCity:"New York",  dep:"08:30", arr:"15:15", gate:"A1",    status:"ON-TIME"       },
      { id:"EK 512", airline:"Emirates",       from:"DXB", to:"DEL", fromCity:"Dubai",     toCity:"Delhi",     dep:"10:20", arr:"13:50", gate:"T3-01", status:"ARRIVED"       },
      { id:"BA 217", airline:"British Airways",from:"LHR", to:"JFK", fromCity:"London",    toCity:"New York",  dep:"11:15", arr:"14:30", gate:"A18",   status:"DELAYED"       },
      { id:"BA 123", airline:"British Airways",from:"LHR", to:"DOH", fromCity:"London",    toCity:"Doha",      dep:"19:10", arr:"01:30", gate:"A5",    status:"ON-TIME"       },
      { id:"QR 507", airline:"Qatar Airways",  from:"DOH", to:"DEL", fromCity:"Doha",      toCity:"Delhi",     dep:"13:40", arr:"18:10", gate:"T3-05", status:"BAGGAGE CLAIM" },
      { id:"AA 101", airline:"American Air",   from:"JFK", to:"LHR", fromCity:"New York",  toCity:"London",    dep:"06:30", arr:"18:45", gate:"B4",    status:"ARRIVED"       }
    ];

    /* Static weather data (no API needed) */
    const WEATHER = {
      DOH: "34°C  Sunny",
      DEL: "28°C  Haze",
      LHR: "12°C  Overcast",
      JFK: "18°C  Partly Cloudy",
      DXB: "38°C  Clear",
      HND: "16°C  Drizzle",
      CDG: "14°C  Cloudy",
      SIN: "30°C  Thunderstorm",
      FRA: "11°C  Fog",
      SYD: "22°C  Sunny",
      YYZ: "6°C   Snow",
      IST: "17°C  Partly Cloudy"
    };

    /* Notices board */
    const NOTICES = [
      { tag:"INFO",  type:"info",  text:"Check-in counters open 3 hours before departure for international flights." },
      { tag:"INFO",  type:"info",  text:"Carry-on baggage limit: 7kg. Excess baggage fees apply at check-in." },
      { tag:"WARN",  type:"warn",  text:"High passenger volume expected today. Allow extra time at security." },
      { tag:"INFO",  type:"info",  text:"Free Wi-Fi available throughout the terminal — network: AirportFreeWiFi." }
    ];

    const STATUS_CLASS = {
      "ON-TIME":      "st-on-time",
      "DELAYED":      "st-delayed",
      "BOARDING":     "st-boarding",
      "CANCELLED":    "st-cancelled",
      "ARRIVED":      "st-arrived",
      "BAGGAGE CLAIM":"st-baggage-claim",
      "IMMIGRATION":  "st-immigration",
      "SCHEDULED":    "st-scheduled"
    };

    /* ── STATE ── */
    let savedFlight  = JSON.parse(localStorage.getItem('skytrace_flight') || 'null');
    let savedGate    = localStorage.getItem('skytrace_gate') || null;
    let savedStatus  = localStorage.getItem('skytrace_status') || null;

    /* ── CLOCK ── */
    function startClock() {
      const el = document.getElementById('boardClock');
      if (!el) return;
      const tick = () => el.textContent = new Date().toLocaleTimeString('en-GB');
      tick(); setInterval(tick, 1000);
    }

    /* ── FLASH a changed cell ── */
    function flashCell(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('flashing');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('flashing');
      setTimeout(() => el.classList.remove('flashing'), 1500);
    }

    /* ── SIMULATE LIVE UPDATES ── */
    function simulateUpdates(flight) {
      /* Every 12s randomly tweak gate or status to demonstrate live change detection */
      const statusCycle = ["ON-TIME","DELAYED","BOARDING","ON-TIME","ON-TIME"];
      let si = 0;
      setInterval(() => {
        /* Gate change simulation */
        const gateChanged = Math.random() < 0.25;
        if (gateChanged) {
          const gates = ["T3-14","A2","B6","T1-09","A22","C4"];
          const newGate = gates[Math.floor(Math.random() * gates.length)];
          if (newGate !== document.getElementById('val-gate').textContent) {
            const oldGate = document.getElementById('val-gate').textContent;
            localStorage.setItem('skytrace_gate', newGate);
            document.getElementById('val-gate').textContent = newGate;
            flashCell('cell-gate');
            /* Show alert */
            const alert = document.getElementById('gate-alert');
            alert.querySelector('.alert-text').textContent =
              `GATE CHANGED  —  was ${oldGate}`;
            alert.classList.add('visible');
          }
        }

        /* Status progression */
        if (flight.status !== "CANCELLED" && flight.status !== "ARRIVED") {
          si = (si + 1) % statusCycle.length;
          const newStatus = statusCycle[si];
          const valEl  = document.getElementById('val-status');
          const badgeEl = document.getElementById('badge-status');
          if (newStatus !== valEl.dataset.status) {
            valEl.dataset.status = newStatus;
            badgeEl.className = `st ${STATUS_CLASS[newStatus] || 'st-scheduled'}`;
            badgeEl.textContent = newStatus;
            flashCell('cell-status');
            localStorage.setItem('skytrace_status', newStatus);
          }
        }
      }, 12000);
    }

    /* ── RENDER BOARD ── */
    function renderBoard(flight) {
      const wrap = document.getElementById('dashWrap');
      wrap.innerHTML = `
        <div class="board">

          <!-- Terminal title bar -->
          <div class="board-bar">
            <div class="board-bar-left">
              <div class="dot red"></div>
              <div class="dot yellow"></div>
              <div class="dot green"></div>
              <span class="board-title">skytrace — my flight</span>
            </div>
            <span class="board-clock" id="boardClock">--:--:--</span>
          </div>

          <!-- Board content -->
          <div class="board-body">

            <!-- Flight ID + airline -->
            <div class="b-flight-id">
              <span class="b-id">${flight.id}</span>
              <span class="b-airline">${flight.airline}</span>
            </div>

            <!-- Route -->
            <div class="b-route">
              <span>${flight.from}</span>
              <span class="b-route-arrow">──►</span>
              <span>${flight.to}</span>
            </div>

            <hr class="b-divider">

            <!-- Core data grid -->
            <div class="b-grid">
              <div class="b-cell" id="cell-dep">
                <span class="b-cell-label">Departure</span>
                <span class="b-cell-value gold">${flight.dep}</span>
              </div>
              <div class="b-cell" id="cell-arr">
                <span class="b-cell-label">Arrival</span>
                <span class="b-cell-value gold">${flight.arr}</span>
              </div>
              <div class="b-cell" id="cell-from">
                <span class="b-cell-label">Origin</span>
                <span class="b-cell-value">${flight.fromCity.toUpperCase()}</span>
              </div>
              <div class="b-cell" id="cell-to">
                <span class="b-cell-label">Destination</span>
                <span class="b-cell-value">${flight.toCity.toUpperCase()}</span>
              </div>
              <div class="b-cell" id="cell-gate">
                <span class="b-cell-label">Gate</span>
                <span class="b-cell-value" id="val-gate">${flight.gate}</span>
              </div>
              <div class="b-cell" id="cell-status">
                <span class="b-cell-label">Status</span>
                <span id="val-status" data-status="${flight.status}">
                  <span id="badge-status" class="st ${STATUS_CLASS[flight.status] || 'st-scheduled'}">${flight.status}</span>
                </span>
              </div>
            </div>

            <!-- Gate change alert (hidden until triggered) -->
            <div class="b-alert" id="gate-alert">
              <span class="b-alert-icon">⚠</span>
              <span class="alert-text">GATE CHANGED</span>
            </div>

            <hr class="b-divider">

            <!-- Weather -->
            <div class="b-weather">
              <div class="b-weather-cell">
                <span class="b-weather-airport">${flight.from}  Origin</span>
                <span class="b-weather-val">${WEATHER[flight.from] || '--'}</span>
              </div>
              <div class="b-weather-cell">
                <span class="b-weather-airport">${flight.to}  Destination</span>
                <span class="b-weather-val">${WEATHER[flight.to] || '--'}</span>
              </div>
            </div>

            <hr class="b-divider">

            <!-- Notices -->
            <div class="b-messages">
              ${NOTICES.map(n => `
                <div class="b-msg">
                  <span class="b-msg-tag ${n.type}">${n.tag}</span>${n.text}
                </div>`).join('')}
            </div>

          </div>
        </div>

        <!-- Clear / change flight -->
        <div class="b-clear">
          <button id="clearBtn">✕  Clear flight — select a different one</button>
        </div>`;

      startClock();
      simulateUpdates(flight);
      document.getElementById('clearBtn').addEventListener('click', clearFlight);
    }

    /* ── RENDER EMPTY STATE ── */
    function renderEmpty() {
      const wrap = document.getElementById('dashWrap');
      wrap.innerHTML = `
        <div class="empty-state">
          <p class="empty-label">My Flight</p>
          <p class="empty-title">No flight selected.<br>Choose your flight below to track it here.</p>
          <form class="setup-form" id="setupForm">
            <select id="flightSelect">
              <option value="">-- Select your flight --</option>
              ${FLIGHTS.map(f =>
                `<option value="${f.id}">${f.id}  ${f.from} → ${f.to}  (${f.dep})</option>`
              ).join('')}
            </select>
            <button type="submit" class="btn btn-primary" style="width:100%;">Track This Flight</button>
          </form>
        </div>`;

      document.getElementById('setupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('flightSelect').value;
        if (!id) return;
        const flight = FLIGHTS.find(f => f.id === id);
        if (!flight) return;
        localStorage.setItem('skytrace_flight', JSON.stringify(flight));
        localStorage.setItem('skytrace_gate', flight.gate);
        localStorage.setItem('skytrace_status', flight.status);
        savedFlight = flight;
        renderBoard(flight);
      });
    }

    /* ── CLEAR ── */
    function clearFlight() {
      localStorage.removeItem('skytrace_flight');
      localStorage.removeItem('skytrace_gate');
      localStorage.removeItem('skytrace_status');
      savedFlight = null;
      renderEmpty();
    }

    /* ── MOBILE NAV ── */
   
    /* ── INIT ── */
    window.addEventListener('DOMContentLoaded', () => {
      if (savedFlight) renderBoard(savedFlight);
      else renderEmpty();
    });
  </script>

</body>
</html>
