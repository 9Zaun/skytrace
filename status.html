<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrace | Live Operations</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --gold: #c39d63;
            --bg: #050505;
            --surface: #111111;
            --border: #1f1f1f;
            --text: #f5f5f5;
            --muted: #6b7280;
            --online: #22d3a0;
            --delay: #f59e0b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        nav {
            border-bottom: 1px solid rgba(195, 157, 99, 0.2);
            background: black;
        }

        .gold {
            color: var(--gold);
        }

        .status-container {
            background: var(--surface);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: var(--gold);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 18px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd;
        }

        tr:hover {
            background: rgba(195, 157, 99, 0.03);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .active {
            background: rgba(34, 211, 160, 0.12);
            color: var(--online);
        }

        .delayed {
            background: rgba(245, 158, 11, 0.12);
            color: var(--delay);
        }
    </style>

</head>

<body>

    <!-- NAV -->

    <nav class="flex justify-between items-center px-8 py-5">

        <h1 class="text-2xl font-bold gold tracking-widest">
            SKYTRACE
        </h1>

        <div class="flex gap-6 text-sm uppercase tracking-wider">

            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="search.html">Search</a>
            <a href="hubs.html">Hubs</a>

        </div>

    </nav>

    <!-- HEADER -->

    <section class="text-center py-16 px-6">

        <p class="gold text-sm tracking-[4px] uppercase mb-4">
            Live Flight Operations
        </p>

        <h1 class="text-5xl font-bold mb-6">
            Airport Status Board
        </h1>

        <p class="max-w-3xl mx-auto text-gray-400 leading-relaxed">
            Real-time departures, arrivals, gate activity,
            and operational aviation updates powered by AviationStack.
        </p>

    </section>

    <!-- TABLE -->

    <main class="max-w-7xl mx-auto px-6 pb-20">

        <div class="status-container rounded-xl overflow-hidden">

            <table>

                <thead>

                    <tr>
                        <th>Flight</th>
                        <th>Departure</th>
                        <th>Arrival</th>
                        <th>Scheduled</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody id="flightTable"></tbody>

            </table>

        </div>

    </main>

    <script src="api.js"></script>
    <script src="status.js"></script>

</body>

</html>
