<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyTrace-Global Search</title>
    <style>
        :root { --gold: #c39d63; --maroon: #81202e; }
        body { background: black; color: whitesmoke; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .wrapper { padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        .nav-header { border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .home-link { color: var(--gold); text-decoration: none; letter-spacing: 2px; font-size: 0.8rem; border: 1px solid #333; padding: 8px 15px; }

       
        .search-panel { background: black; padding: 25px; border-radius: 4px; border: 1px solid #222; margin-bottom: 30px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 20px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; color: #666; letter-spacing: 1px; font-weight: bold; }
        input { background: black; border: 1px solid #333; color: var(--gold); padding: 12px; font-size: 1rem; border-radius: 2px; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab { padding: 8px 20px; background: #222; border: none; color: #888; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .tab.active { background: var(--gold); color: #000; }

        .search-btn { background: var(--gold); color: #000; border: none; padding: 0 40px; font-weight: bold; cursor: pointer; height: 48px; align-self: flex-end; }

        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #444; font-size: 0.7rem; letter-spacing: 2px; padding: 15px; border-bottom: 2px solid #222; }
        td { padding: 20px 15px; border-bottom: 1px solid #111; }
        .st { padding: 5px 10px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; display: inline-block; min-width: 110px; text-align: center; }
        .st-on-time { color: #39ff14; border: 1px solid #39ff14; }
        .st-boarding { background: var(--maroon); color: #fff; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="nav-header">
        <a href="hubs.html" class="home-link">HOME</a>
        <h2 style="margin:0; color:var(--gold); letter-spacing: 5px;">FLIGHT SEARCH</h2>
    </div>

    <div class="search-panel">
        <div class="tab-bar">
            <button id="modeDep" class="tab active" onclick="setSearchMode('DEP')">DEPARTING FROM</button>
            <button id="modeArr" class="tab" onclick="setSearchMode('ARR')">ARRIVING TO</button>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label id="inputLabel">ORIGIN CITY/COUNTRY</label>
                <input type="text" id="mainInput" placeholder="e.g. Doha or DOH" onkeyup="runSearch()">
            </div>
            <div class="input-group">
                <label>FLIGHT NUMBER (OPTIONAL)</label>
                <input type="text" id="flightInput" placeholder="e.g. QR 001" onkeyup="runSearch()">
            </div>
            <button class="search-btn" onclick="runSearch()">SEARCH</button>
        </div>
    </div>

    <div id="resultsArea">
        <table id="resultsTable" style="display: none;">
            <thead>
                <tr>
                    <th>TIME</th>
                    <th>FLIGHT</th>
                    <th>FROM</th>
                    <th>TO</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="searchBody"></tbody>
        </table>
        <div id="msg" style="text-align: center; color: grey; margin-top: 50px;">
            Enter an origin or destination to see live results.
        </div>
    </div>
</div>

<script>
   
    const FLIGHT_DATA = {
        flights: [
            { id: "QR 001", from: "Doha", fromCode: "DOH", to: "London", sch: "08:00", status: "ON-TIME", gate: "A1" },
            { id: "QR 002", from: "London", fromCode: "LHR", to: "Doha", sch: "14:20", status: "ARRIVED", gate: "A1" },
            { id: "AI 101", from: "Delhi", fromCode: "DEL", to: "Mumbai", sch: "09:00", status: "BOARDING", gate: "T3" },
            { id: "EK 512", from: "Dubai", fromCode: "DXB", to: "Delhi", sch: "10:20", status: "ARRIVED", gate: "T3-01" }
        ]
    };

    let searchMode = 'DEP';

    function setSearchMode(mode) {
        searchMode = mode;
        document.getElementById('modeDep').classList.toggle('active', mode === 'DEP');
        document.getElementById('modeArr').classList.toggle('active', mode === 'ARR');
        document.getElementById('inputLabel').innerText = mode === 'DEP' ? 'ORIGIN CITY/COUNTRY' : 'DESTINATION CITY/COUNTRY';
        runSearch();
    }

    function runSearch() {
        const mainVal = document.getElementById('mainInput').value.toUpperCase();
        const flightVal = document.getElementById('flightInput').value.toUpperCase();
        const body = document.getElementById('searchBody');
        const table = document.getElementById('resultsTable');
        const msg = document.getElementById('msg');

        if (!mainVal && !flightVal) {
            table.style.display = 'none';
            msg.style.display = 'block';
            return;
        }

        let matches = FLIGHT_DATA.flights.filter(f => {
            let isLocMatch = true;
            let isFlightMatch = true;

            if (mainVal) {
                if (searchMode === 'DEP') {
                    isLocMatch = f.from.toUpperCase().includes(mainVal) || f.fromCode.toUpperCase().includes(mainVal);
                } else {
                    isLocMatch = f.to.toUpperCase().includes(mainVal);
                }
            }

            if (flightVal) {
                isFlightMatch = f.id.toUpperCase().includes(flightVal);
            }

            return isLocMatch && isFlightMatch;
        });

        body.innerHTML = '';
        
        if (matches.length > 0) {
            table.style.display = 'table';
            msg.style.display = 'none';
            matches.forEach(f => {
                const slug = f.status.toLowerCase().replace(/\s+/g, '-');
                body.innerHTML += `
                    <tr>
                        <td style="font-family:monospace;">${f.sch}</td>
                        <td style="color:var(--gold); font-weight:bold;">${f.id}</td>
                        <td>${f.from}</td>
                        <td>${f.to}</td>
                        <td><span class="st st-${slug}">${f.status}</span></td>
                    </tr>`;
            });
        } else {
            table.style.display = 'none';
            msg.style.display = 'block';
            msg.innerText = "No flights found for those options.";
        }
    }
</script>
</body>
</html>
